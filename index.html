<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enki</title>
    <style>
        /* Odstranění výchozích okrajů prohlížeče */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Zabrání zobrazení posuvníků */
            background-color: #000; /* Černé pozadí pro jistotu */
        }

        /* Nastavení obrázku na celou obrazovku */
        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Vyplní obrazovku bez zploštění/roztažení obrázku */
            display: block;
        }
    </style>
</head>
<body>

    <img src="Enki.png" alt="Enki">

</body>
</html>
